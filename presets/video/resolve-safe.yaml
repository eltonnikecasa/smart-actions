id: resolve_safe

enabled: true
min_files: 1
max_files: 1
multi_file: false

engine: ffmpeg

menu:
  group: video
  priority: 1

mime:
  - video/*

output:
  extension: mov
  preserve_extension: false
  suffix: resolve

command:
  args:
    - -c:v
    - prores_ks

    - -profile:v
    - "1"

    - -pix_fmt
    - yuv422p10le

    - -c:a
    - pcm_s16le
