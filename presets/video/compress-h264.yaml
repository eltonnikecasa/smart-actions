id: compress_h264

enabled: true
min_files: 1
max_files: 1
multi_file: false

engine: ffmpeg

menu:
  group: video
  priority: 3

mime:
  - video/*

output:
  extension: mp4
  preserve_extension: false
  suffix: compressed

command:
  args:
    - -c:v
    - libx264

    - -crf
    - "23"

    - -preset
    - medium

    - -c:a
    - aac

    - -b:a
    - 192k
