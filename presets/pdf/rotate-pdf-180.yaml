id: pdf_rotate_180

enabled: true

min_files: 1
max_files: 1

engine: ghostscript

menu:
  group: pdf
  priority: 4

mime:
  - application/pdf

output:
  extension: pdf
  preserve_extension: false
  suffix: rotated

command:
  args:
    - -sDEVICE=pdfwrite

    - -sOutputFile={output}

    - -dAutoRotatePages=/None

    - -c
    - "<</Orientation 2>> setpagedevice"

    - -f
