id: pdf_to_jpg

enabled: true

min_files: 1
max_files: 1

multi_file: false

engine: imagemagick

menu:
  group: pdf
  priority: 10

mime:
  - application/pdf

output:
  extension: jpg
  preserve_extension: false
  suffix: converted

command:
  args:
    - -density
    - "300"

    - -quality
    - "95"
